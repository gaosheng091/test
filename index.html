<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Type16 人格测试</title>
<style>
  :root{ --bg:#f6f7fb; --card:#fff; --ink:#22252b; --sub:#8a90a0; --line:#eceef3; --accent:#5b6cf0; }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
       background:var(--bg);color:var(--ink);line-height:1.6;}
  .wrap{max-width:560px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}
  .pad{padding:20px;}
  h1{font-size:24px;margin:6px 0 2px;}
  .muted{color:var(--sub);font-size:13px;}

  /* 首页卡片 */
  .hero{padding:34px 20px 14px;}
  .cards{display:flex;flex-direction:column;gap:12px;padding:8px 20px 28px;}
  .vcard{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px 18px;
         cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:space-between;}
  .vcard:active{transform:scale(.985);}
  .vcard .t{font-size:17px;font-weight:600;}
  .vcard .s{font-size:12.5px;color:var(--sub);margin-top:3px;}
  .badge{font-size:13px;font-weight:700;color:#fff;background:var(--accent);border-radius:20px;padding:6px 12px;white-space:nowrap;}
  .tip{font-size:12px;color:var(--sub);padding:0 22px 26px;}

  /* 答题 */
  .topbar{display:flex;align-items:center;gap:12px;padding:14px 20px;border-bottom:1px solid var(--line);background:var(--card);position:sticky;top:0;z-index:5;}
  .back{font-size:14px;color:var(--sub);background:none;border:none;cursor:pointer;}
  .pbar{flex:1;height:6px;background:var(--line);border-radius:6px;overflow:hidden;}
  .pfill{height:100%;background:var(--accent);width:0;transition:.25s;}
  .pnum{font-size:12.5px;color:var(--sub);min-width:54px;text-align:right;}

  .qbox{flex:1;display:flex;flex-direction:column;justify-content:center;padding:18px 20px 8px;}
  .qhint{text-align:center;color:var(--sub);font-size:13px;margin-bottom:18px;}
  .traits{display:flex;justify-content:space-between;gap:14px;margin-bottom:10px;}
  .traits .lab{flex:1;font-size:16px;font-weight:600;}
  .traits .lab.r{text-align:right;}
  .scale{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:14px 4px 4px;}
  .dot{border-radius:50%;border:2px solid #cfd4e6;background:#fff;cursor:pointer;transition:.12s;flex:none;}
  .dot:active{transform:scale(.9);}
  .d1{width:46px;height:46px;border-color:#7d8af2;}
  .d2{width:38px;height:38px;border-color:#a6aef6;}
  .d3{width:30px;height:30px;}
  .d4{width:38px;height:38px;border-color:#f0a6c8;}
  .d5{width:46px;height:46px;border-color:#ef7db0;}
  .dot.sel{background:var(--accent);border-color:var(--accent);box-shadow:0 4px 14px rgba(91,108,240,.4);}
  .dot.sel.right{background:#ef5fa0;border-color:#ef5fa0;box-shadow:0 4px 14px rgba(239,95,160,.4);}
  .sidehint{display:flex;justify-content:space-between;color:var(--sub);font-size:11px;padding:2px 2px 0;}
  .nav{display:flex;gap:12px;padding:18px 20px 26px;}
  .btn{flex:1;border:none;border-radius:12px;padding:13px;font-size:15px;cursor:pointer;}
  .btn.ghost{background:#eef0f7;color:#5a6172;}
  .btn.prim{background:var(--accent);color:#fff;}
  .btn:disabled{opacity:.4;cursor:default;}

  /* 结果 */
  .result{padding:30px 22px 40px;text-align:center;}
  .rtype{font-size:54px;font-weight:800;letter-spacing:2px;}
  .rname{font-size:22px;font-weight:700;margin-top:2px;}
  .rgroup{display:inline-block;color:#fff;border-radius:20px;padding:3px 14px;font-size:13px;margin-top:10px;}
  .rslogan{font-size:15px;color:#5a6172;margin:16px 6px;font-style:italic;}
  .rdesc{font-size:14.5px;color:#42474f;text-align:left;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin:8px 0 18px;}
  .bars{text-align:left;margin:10px 0 8px;}
  .bar{margin:14px 0;}
  .bar .bt{display:flex;justify-content:space-between;font-size:13px;color:#5a6172;margin-bottom:5px;}
  .bar .track{height:10px;background:#edeff5;border-radius:8px;position:relative;overflow:hidden;}
  .bar .fill{position:absolute;top:0;bottom:0;background:var(--accent);border-radius:8px;}
  .tags{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:6px 0 4px;}
  .tag{font-size:12.5px;background:#eef0f7;color:#4a5160;border-radius:16px;padding:5px 12px;}
  .tag.g{background:#fef0e6;color:#c47a2c;}
  .sec-t{font-size:13px;color:var(--sub);margin:18px 0 8px;}
</style>
</head>
<body>

规则、推动落地,重视责任与效率。", "strengths": ["执行", "组织", "责任"], "growth": ["倾听异见", "柔性沟通"]}, "ESFJ": {"name": "执政官", "group": "SJ", "slogan": "热心周到,把大家照顾妥帖。", "desc": "友善、尽责,关注他人需求,擅长营造和谐有序的集体氛围。", "strengths": ["热心", "协调", "尽责"], "growth": ["接受批评", "关注自我"]}, "ISTP": {"name": "鉴赏家", "group": "SP", "slogan": "动手解决问题的实干派。", "desc": "冷静、灵巧,喜欢拆解和动手,在实践中探索事物如何运作。", "strengths": ["动手能力", "冷静", "应变"], "growth": ["长期承诺", "情感表达"]}, "ISFP": {"name": "探险家", "group": "SP", "slogan": "用感官与真心体验世界。", "desc": "温和、敏感的艺术家气质,活在当下,以行动而非言语表达自我。", "strengths": ["审美", "真诚", "随和"], "growth": ["长远规划", "表达主张"]}, "ESTP": {"name": "企业家", "group": "SP", "slogan": "活在当下,敢闯敢拼。", "desc": "精力充沛、行动派,善于抓住机会、临场应变,享受刺激与挑战。", "strengths": ["果敢", "应变", "现实感"], "growth": ["三思后行", "顾及他人"]}, "ESFP": {"name": "表演者", "group": "SP", "slogan": "把每一刻都过成精彩现场。", "desc": "热情、外放,热爱生活与人群,擅长用快乐感染身边每一个人。", "strengths": ["活力", "亲和", "乐观"], "growth": ["专注长远", "处理冲突"]}}};

/* ---------- 计分引擎(与 src/scoring.js 同一逻辑) ---------- */
const AXES={EI:['E','I'],SN:['S','N'],TF:['T','F'],JP:['J','P']};
const TIE={EI:'I',SN:'S',TF:'F',JP:'J'};
function selectVersion(key){
  const cfg=VERSIONS.versions[key], out=[];
  for(const dim in cfg.perDim){
    out.push(...BANK.questions.filter(q=>q.dim===dim).sort((a,b)=>a.order-b.order).slice(0,cfg.perDim[dim]));
  }
  return out;
}
function score(qs,ans){
  const p={E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0};
  for(const q of qs){const v=ans[q.id];if(v==null)continue;p[q.leftPole]+=(5-v);p[q.rightPole]+=(v-1);}
  let type='';const dims={};
  for(const ax in AXES){const[a,b]=AXES[ax];const pa=p[a],pb=p[b];
    const L=pa>pb?a:pb>pa?b:TIE[ax];const tot=pa+pb,win=Math.max(pa,pb);
    dims[ax]={a,b,pa,pb,letter:L,strength:tot?Math.round(win/tot*1000)/10:50};type+=L;}
  return {type,dims};
}

/* ---------- 状态 + 渲染 ---------- */
let S={view:'home',vkey:null,qs:[],idx:0,ans:{}};
const app=document.getElementById('app');
const esc=s=>String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));

function render(){
  if(S.view==='home') return renderHome();
  if(S.view==='test') return renderTest();
  if(S.view==='result') return renderResult();
}

function renderHome(){
  const cards=VERSIONS.order.map(k=>{const v=VERSIONS.versions[k];
    return `<div class="vcard" onclick="startTest('${k}')">
      <div><div class="t">${esc(v.label)}</div><div class="s">${esc(v.subtitle||'')}</div></div>
      <div class="badge">${v.total}题</div></div>`;}).join('');
  app.innerHTML=`<div class="hero"><h1>Type16 人格测试</h1>
    <div class="muted">选择一个版本开始 · 题目越多结果越精细</div></div>
    <div class="cards">${cards}</div>
    <div class="tip">基于荣格人格分类的 16 型(MBTI 风格)。结果仅供自我探索参考。</div>`;
}

function startTest(key){S.view='test';S.vkey=key;S.qs=selectVersion(key);S.idx=0;S.ans={};render();}

function renderTest(){
  const q=S.qs[S.idx], total=S.qs.length, cur=S.ans[q.id]||null;
  const prog=Math.round(S.idx/total*100);
  const dots=[1,2,3,4,5].map(v=>
    `<div class="dot d${v} ${cur===v?('sel'+(v>3?' right':'')):''}" onclick="answer(${v})"></div>`).join('');
  app.innerHTML=`
    <div class="topbar">
      <button class="back" onclick="goHome()">‹ 退出</button>
      <div class="pbar"><div class="pfill" style="width:${prog}%"></div></div>
      <div class="pnum">${S.idx+1} / ${total}</div>
    </div>
    <div class="qbox">
      <div class="qhint">下面两种描述,你更偏向哪一边?</div>
      <div class="traits"><div class="lab">${esc(q.left)}</div><div class="lab r">${esc(q.right)}</div></div>
      <div class="scale">${dots}</div>
      <div class="sidehint"><span>非常符合左边</span><span>非常符合右边</span></div>
    </div>
    <div class="nav">
      <button class="btn ghost" onclick="prev()" ${S.idx===0?'disabled':''}>上一题</button>
      <button class="btn prim" onclick="next()" ${cur?'':'disabled'}>${S.idx===total-1?'查看结果':'下一题'}</button>
    </div>`;
}

function answer(v){const q=S.qs[S.idx];S.ans[q.id]=v;
  // 选完自动进入下一题(最后一题不自动跳)
  if(S.idx<S.qs.length-1){setTimeout(()=>{S.idx++;render();},180);}else{render();}
}
function prev(){if(S.idx>0){S.idx--;render();}}
function next(){const q=S.qs[S.idx];if(!S.ans[q.id])return;
  if(S.idx<S.qs.length-1){S.idx++;render();}else{S.view='result';render();}}
function goHome(){if(confirm('退出当前测试?进度将丢失。')){S.view='home';render();}}

function renderResult(){
  const r=score(S.qs,S.ans), t=TYPES.types[r.type], g=TYPES.groups[t.group], color=g.color;
  const axName={EI:['外向 E','内向 I'],SN:['实感 S','直觉 N'],TF:['思考 T','情感 F'],JP:['判断 J','知觉 P']};
  const bars=Object.keys(AXES).map(ax=>{const d=r.dims[ax];
    const isLeft=d.letter===d.a; const pct=d.strength;
    const lname=axName[ax][0], rname=axName[ax][1];
    const fillStyle=isLeft?`right:50%;width:${pct/2}%;background:${color}`:`left:50%;width:${pct/2}%;background:${color}`;
    return `<div class="bar"><div class="bt"><span style="${isLeft?'font-weight:700;color:'+color:''}">${lname}</span>
      <span style="${!isLeft?'font-weight:700;color:'+color:''}">${rname}</span></div>
      <div class="track"><div class="fill" style="${fillStyle}"></div></div>
      <div class="muted" style="text-align:center;margin-top:3px;">${d.letter} · ${pct}%</div></div>`;}).join('');
  const str=(t.strengths||[]).map(s=>`<span class="tag">${esc(s)}</span>`).join('');
  const grow=(t.growth||[]).map(s=>`<span class="tag g">${esc(s)}</span>`).join('');
  app.innerHTML=`<div class="result">
    <div class="rtype" style="color:${color}">${r.type}</div>
    <div class="rname">${esc(t.name)}</div>
    <div class="rgroup" style="background:${color}">${esc(g.name)}型</div>
    <div class="rslogan">“${esc(t.slogan)}”</div>
    <div class="rdesc">${esc(t.desc)}</div>
    <div class="bars">${bars}</div>
    <div class="sec-t">你的优势</div><div class="tags">${str}</div>
    <div class="sec-t">可成长之处</div><div class="tags">${grow}</div>
    <div class="nav" style="padding:24px 0 0;">
      <button class="btn ghost" onclick="goHome()">重新选择</button>
      <button class="btn prim" onclick="startTest(S.vkey)">再测一次</button>
    </div>
    <div class="muted" style="margin-top:16px;">版本:${esc(VERSIONS.versions[S.vkey].label)} · ${S.qs.length}题</div>
  </div>`;
}

render();
</script>
</body>
